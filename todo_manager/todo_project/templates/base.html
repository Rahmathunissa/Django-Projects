<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{% url 'task-list' %}">📝 Task Manager</a>
    {% if user.is_authenticated %}
      <span class="text-light">{{ user.username }}
        <a href="{% url 'task-create' %}" class="btn btn-sm btn-outline-light">+ New</a>
        <form method="post" action="{% url 'logout' %}" class="d-inline">{% csrf_token %}
          <button class="btn btn-sm btn-outline-light">Logout</button></form>
      </span>
    {% else %}
      <a href="{% url 'login' %}" class="btn btn-sm btn-outline-light">Login</a>
      <a href="{% url 'signup' %}" class="btn btn-sm btn-light">Sign up</a>
    {% endif %}
  </div>
</nav>
<div class="container">
    {% for message in messages %}<div class="alert alert-{{ message.tags }}">{{ message }}</div>{% endfor %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
